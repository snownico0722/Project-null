<!doctype html>
<meta charset="utf-8">
<script>
const saved = {
  version: 7,
  config: { enabled: true, resetMode: 'time', replaceAvatars: true, hideIdentityDecorations: true, hideSignatures: true, mapAliasMentions: true, hideDissolvedTopics: false, cleanTopicTitles: false, pureMode: false },
  dissolvedUsers: ['hidden-user'], secret: '0123456789abcdefghijklmn', topicSalt: 'topic',
  timeEpoch: { id: 'epoch', startedAt: Date.now(), lastTriggeredAt: 0 }
};
let stateListener = null;
requestAnimationFrame = callback => setTimeout(() => callback(performance.now()), 0);
cancelAnimationFrame = timer => clearTimeout(timer);
GM_getValue = () => JSON.stringify(saved);
GM_setValue = (key, value) => Object.assign(saved, JSON.parse(value));
GM_addValueChangeListener = (key, listener) => { stateListener = listener; };
GM_registerMenuCommand = () => {};
unsafeWindow = window;
jQuery = { ajax() { return { abort() {} }; } };
</script>
<header id="site-header"><div class="header-icons"></div></header>
<article data-post-id="1">
  <div class="cooked">
    <aside class="quote" data-username="hidden-user" data-post="2" data-topic="1">
      <div class="title" data-has-quote-controls="true" data-can-toggle-quote="true" data-can-navigate-to-post="true">
        <div class="quote-controls"><button type="button" class="quote-toggle">toggle</button></div>
        <img class="avatar" src="https://linux.do/user_avatar/linux.do/hidden-user/48/1.png" alt="hidden-user">
        hidden-user:
      </div>
      <blockquote>quoted body</blockquote>
    </aside>
  </div>
</article>
<pre id="out"></pre>
<script src="../linuxdo-Project-null.user.js"></script>
<script>
const wait = ms => new Promise(resolve => setTimeout(resolve, ms));

function snapshot() {
  const title = document.querySelector('.quote .title');
  const avatar = title.querySelector('img.avatar');
  return {
    alias: title.dataset.lddAlias || '',
    titleText: title.textContent.replace(/\s+/g, ' ').trim(),
    avatarReplaced: avatar.getAttribute('src').startsWith('data:image/svg+xml'),
    avatarAlias: avatar.getAttribute('data-ldd-avatar-alias') || '',
    controlsPresent: Boolean(title.querySelector('.quote-controls .quote-toggle')),
    bodyText: document.querySelector('.quote blockquote').textContent
  };
}

addEventListener('DOMContentLoaded', async () => {
  await wait(180);
  const initial = snapshot();
  const title = document.querySelector('.quote .title');
  title.innerHTML = '<div class="quote-controls"><button type="button" class="quote-toggle">toggle</button></div>'
    + '<img class="avatar" src="https://linux.do/user_avatar/linux.do/hidden-user/48/2.png" alt="hidden-user"> hidden-user:';
  await wait(180);
  const rebuilt = snapshot();
  const restoredState = { ...saved, dissolvedUsers: [] };
  stateListener?.(null, null, JSON.stringify(restoredState), true);
  await wait(180);
  const restored = snapshot();
  const maskedFailure = [initial, rebuilt].some(result =>
    !result.alias
    || result.titleText.includes('hidden-user')
    || !result.titleText.includes(result.alias)
    || !result.avatarReplaced
    || result.avatarAlias !== result.alias
    || !result.controlsPresent
    || result.bodyText !== 'quoted body'
  );
  const restoreFailure = Boolean(
    restored.alias
    || !restored.titleText.includes('hidden-user')
    || restored.avatarReplaced
    || restored.avatarAlias
    || !restored.controlsPresent
    || restored.bodyText !== 'quoted body'
  );
  out.textContent = JSON.stringify({
    initial, rebuilt, restored, failures: maskedFailure || restoreFailure
  });
});
</script>
